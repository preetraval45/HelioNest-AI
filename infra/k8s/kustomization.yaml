apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: helionest

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres/pvc.yaml
  - postgres/statefulset.yaml
  - postgres/service.yaml
  - postgres/backup-cronjob.yaml
  - redis/deployment.yaml
  - redis/service.yaml
  - backend/deployment.yaml
  - backend/service.yaml
  - backend/hpa.yaml
  - frontend/deployment.yaml
  - frontend/service.yaml
  - ingress/ingress.yaml

# Image tags — override per environment using overlays
images:
  - name: helionest/backend
    newName: helionest/backend
    newTag: latest
  - name: helionest/frontend
    newName: helionest/frontend
    newTag: latest

# Labels applied to all resources
commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: helionest-ai
