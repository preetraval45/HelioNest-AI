# Requires NGINX Ingress Controller installed in the cluster.
# Install: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
#
# For TLS: cert-manager is recommended.
# Install: https://cert-manager.io/docs/installation/
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: helionest-ingress
  namespace: helionest
  labels:
    app.kubernetes.io/part-of: helionest-ai
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Rate limiting — 100 req/min per IP
    nginx.ingress.kubernetes.io/limit-rps: "100"
    # CORS headers for API
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://helionest.app"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,Content-Type,Authorization"
    # TLS — uncomment when cert-manager is installed
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  # TLS — uncomment and update hostname
  # tls:
  #   - hosts:
  #       - helionest.app
  #       - api.helionest.app
  #     secretName: helionest-tls
  rules:
    # API traffic → backend
    - host: api.helionest.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
    # Frontend traffic
    - host: helionest.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
