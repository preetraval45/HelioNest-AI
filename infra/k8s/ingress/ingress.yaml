# Requires NGINX Ingress Controller installed in the cluster.
# Install: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
#
# For TLS: cert-manager is recommended.
# Install: https://cert-manager.io/docs/installation/
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: helionest-ingress
  namespace: helionest
  labels:
    app.kubernetes.io/part-of: helionest-ai
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"
    # Rate limiting — 100 req/min per IP
    nginx.ingress.kubernetes.io/limit-rps: "100"
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://helionest.app"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,Content-Type,Authorization"
    nginx.ingress.kubernetes.io/cors-max-age: "3600"
    # Security headers via configuration-snippet
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
      add_header X-Frame-Options "DENY" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
      add_header X-XSS-Protection "1; mode=block" always;
      more_clear_headers "Server";
    # TLS — uncomment when cert-manager is installed
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  # TLS — uncomment and update hostname
  # tls:
  #   - hosts:
  #       - helionest.app
  #       - api.helionest.app
  #     secretName: helionest-tls
  rules:
    # API traffic → backend
    - host: api.helionest.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 8000
    # Frontend traffic
    - host: helionest.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 3000
