apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: helionest
  labels:
    app: backend
    app.kubernetes.io/part-of: helionest-ai
  annotations:
    # Trigger rolling update when ConfigMap or Secret changes
    configmap/version: "1"
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Wait for DB to be ready via init container
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z postgres-service 5432; do
                echo "Waiting for postgres..."; sleep 2
              done
              echo "Postgres is ready."
        - name: wait-for-redis
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z redis-service 6379; do
                echo "Waiting for redis..."; sleep 2
              done
              echo "Redis is ready."
      containers:
        - name: backend
          # Replace with your actual image (e.g. ghcr.io/yourorg/helionest-backend:latest)
          image: helionest/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: helionest-config
                  key: ENVIRONMENT
            - name: DEBUG
              valueFrom:
                configMapKeyRef:
                  name: helionest-config
                  key: DEBUG
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(DB_USER):$(DB_PASSWORD)@postgres-service:5432/$(DB_NAME)"
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: helionest-config
                  key: DB_USER
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: helionest-config
                  key: DB_NAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: helionest-secrets
                  key: DB_PASSWORD
            - name: REDIS_URL
              value: "redis://redis-service:6379/0"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: helionest-secrets
                  key: SECRET_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: helionest-secrets
                  key: ANTHROPIC_API_KEY
            - name: GEOCODIO_API_KEY
              valueFrom:
                secretKeyRef:
                  name: helionest-secrets
                  key: GEOCODIO_API_KEY
            - name: NREL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: helionest-secrets
                  key: NREL_API_KEY
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                # Graceful shutdown — wait for in-flight requests
                command: ["/bin/sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 30
