apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: helionest
  labels:
    app: postgres
    app.kubernetes.io/part-of: helionest-ai
spec:
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  # ClusterIP — only accessible within the cluster (not exposed externally)
  type: ClusterIP
