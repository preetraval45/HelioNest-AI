apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: helionest
  labels:
    app: postgres
    app.kubernetes.io/part-of: helionest-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  # Set storageClassName to your cluster's storage class (e.g. "gp2" on AWS EKS,
  # "standard" on GKE, or leave empty to use the cluster default).
  # storageClassName: gp2
