apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  namespace: helionest
  labels:
    app: postgres-backup
    app.kubernetes.io/part-of: helionest-ai
spec:
  # Run at 02:00 UTC daily
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: pg-backup
              image: postgis/postgis:15-3.3-alpine
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: helionest-secrets
                      key: DB_PASSWORD
                - name: DB_USER
                  valueFrom:
                    configMapKeyRef:
                      name: helionest-config
                      key: DB_USER
                - name: DB_NAME
                  valueFrom:
                    configMapKeyRef:
                      name: helionest-config
                      key: DB_NAME
              command:
                - /bin/sh
                - -c
                - |
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="/backups/helionest_${TIMESTAMP}.dump"
                  echo "Starting backup to ${BACKUP_FILE} ..."
                  pg_dump \
                    --host=postgres-service \
                    --port=5432 \
                    --username="${DB_USER}" \
                    --dbname="${DB_NAME}" \
                    --format=custom \
                    --compress=9 \
                    --file="${BACKUP_FILE}"
                  echo "Backup complete: ${BACKUP_FILE}"
                  # Prune backups older than 30 days
                  find /backups -name "helionest_*.dump" -mtime +30 -delete
                  echo "Old backups pruned."
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: postgres-backup-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-backup-pvc
  namespace: helionest
  labels:
    app.kubernetes.io/part-of: helionest-ai
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
