apiVersion: v1
kind: ConfigMap
metadata:
  name: helionest-config
  namespace: helionest
  labels:
    app.kubernetes.io/part-of: helionest-ai
data:
  ENVIRONMENT: "production"
  DEBUG: "false"
  # Database host/name (credentials come from Secret)
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "helionest_prod"
  DB_USER: "helionest"
  # Redis
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  # API base URL (set to your domain in production)
  NEXT_PUBLIC_API_URL: "https://api.helionest.app"
  # App
  APP_NAME: "HelioNest AI"
  APP_VERSION: "1.0.0"
