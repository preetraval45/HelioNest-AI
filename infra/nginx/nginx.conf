upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=ai:10m  rate=5r/m;

server {
    listen 80;
    server_name _;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://us.i.posthog.com https://browser.sentry-cdn.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://api.mapbox.com https://*.mapbox.com https://*.tile.openstreetmap.org https://tile.openstreetmap.org https://server.arcgisonline.com https://*.arcgisonline.com; connect-src 'self' https://api.mapbox.com https://*.mapbox.com https://api.openaq.org https://archive-api.open-meteo.com https://api.open-meteo.com https://overpass-api.de https://us.i.posthog.com https://sentry.io https://nominatim.openstreetmap.org wss:; worker-src 'self' blob:; frame-ancestors 'none';" always;

    # ── Request size limits ───────────────────────────────────────────────────
    client_max_body_size 1m;
    client_body_timeout 15s;
    client_header_timeout 15s;
    server_tokens off;

    # ── AI endpoints — tighter rate limit ────────────────────────────────────
    location /api/v1/ai/ {
        limit_req zone=ai burst=3 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Backend API ───────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    location /docs  { proxy_pass http://backend/docs;  proxy_set_header Host $host; }
    location /redoc { proxy_pass http://backend/redoc; proxy_set_header Host $host; }

    # ── Frontend ──────────────────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
