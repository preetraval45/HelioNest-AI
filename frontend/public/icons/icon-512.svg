  <rect x="156" y="400" width="200" height="90" rx="8" fill="#1e293b"/>
  <rect x="220" y="420" width="72" height="70" rx="4" fill="#0f172a" opacity="0.6"/>
  <!-- Text -->
  <text x="256" y="472" font-family="system-ui,sans-serif" font-size="32" font-weight="800" fill="#f59e0b" text-anchor="middle" letter-spacing="2">HELIONEST</text>
