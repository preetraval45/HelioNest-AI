  <circle cx="256" cy="220" r="160" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.15"/>
  <!-- Sun rays -->
  <g transform="translate(256,220)" fill="#f59e0b" opacity="0.2">
    <rect x="-6" y="-155" width="12" height="45" rx="6"/>
    <rect x="-6" y="-155" width="12" height="40" rx="6" transform="rotate(45)"/>
    <rect x="-6" y="-155" width="12" height="40" rx="6" transform="rotate(90)"/>
    <rect x="-6" y="-155" width="12" height="40" rx="6" transform="rotate(135)"/>
    <rect x="-6" y="-155" width="12" height="40" rx="6" transform="rotate(180)"/>
    <rect x="-6" y="-155" width="12" height="40" rx="6" transform="rotate(225)"/>
    <rect x="-6" y="-155" width="12" height="40" rx="6" transform="rotate(270)"/>
    <rect x="-6" y="-155" width="12" height="40" rx="6" transform="rotate(315)"/>
  </g>
  <!-- Sun -->
  <circle cx="256" cy="220" r="90" fill="#f59e0b"/>
  <circle cx="256" cy="220" r="68" fill="#fbbf24"/>
  <circle cx="256" cy="220" r="46" fill="#fde68a"/>
  <!-- House -->
