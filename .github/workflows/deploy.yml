name: Build & Deploy (Docker + Kubernetes)

# Builds Docker images, pushes to GitHub Container Registry (GHCR),
# then deploys to Kubernetes using Kustomize overlays.
#
# Required GitHub Secrets:
#   KUBE_CONFIG        - base64-encoded kubeconfig for your cluster
#   ANTHROPIC_API_KEY  - Anthropic Claude API key
#   GEOCODIO_API_KEY   - Geocodio geocoding API key
#   NREL_API_KEY       - NREL solar API key
#   MAPBOX_TOKEN       - Mapbox access token
#   SECRET_KEY         - Django-style secret key for session signing

on:
  push:
    branches:
      - main          # → production deploy
      - staging       # → staging deploy
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/helionest

jobs:
  # ── Build backend Docker image ─────────────────────────────────────────────
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push backend image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build frontend Docker image ────────────────────────────────────────────
  build-frontend:
    name: Build Frontend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to Kubernetes ───────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment name
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "name=production" >> $GITHUB_OUTPUT
          else
            echo "name=staging" >> $GITHUB_OUTPUT
          fi

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.28.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Set up Kustomize
        run: |
          curl -sL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update image tags in kustomization
        working-directory: infra/k8s/overlays/${{ steps.env.outputs.name }}
        run: |
          kustomize edit set image \
            helionest/backend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.ref_name }} \
            helionest/frontend=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:${{ github.ref_name }}

      - name: Apply Kubernetes secrets from GitHub Secrets
        run: |
          kubectl create secret generic helionest-secrets \
            --namespace=helionest \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=SECRET_KEY="${{ secrets.SECRET_KEY }}" \
            --from-literal=ANTHROPIC_API_KEY="${{ secrets.ANTHROPIC_API_KEY }}" \
            --from-literal=GEOCODIO_API_KEY="${{ secrets.GEOCODIO_API_KEY }}" \
            --from-literal=NREL_API_KEY="${{ secrets.NREL_API_KEY }}" \
            --from-literal=MAPBOX_TOKEN="${{ secrets.MAPBOX_TOKEN }}" \
            --from-literal=NEXT_PUBLIC_MAPBOX_TOKEN="${{ secrets.MAPBOX_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy with Kustomize
        working-directory: infra/k8s/overlays/${{ steps.env.outputs.name }}
        run: |
          kustomize build . | kubectl apply -f -

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n helionest --timeout=120s
          kubectl rollout status deployment/frontend -n helionest --timeout=120s

      - name: Smoke test — health check
        run: |
          # Give the service ~10s to fully start
          sleep 10
          BACKEND_POD=$(kubectl get pod -n helionest -l app=backend -o jsonpath='{.items[0].metadata.name}')
          kubectl exec -n helionest "$BACKEND_POD" -- \
            curl -sf http://localhost:8000/api/v1/health | grep '"status":"ok"'
          echo "Health check passed."

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment to ${{ steps.env.outputs.name }} FAILED. Check the logs above."
